<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potato Disease Predictor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #333;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .upload-section {
            margin-bottom: 30px;
        }

        .file-input-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .file-input-wrapper input[type="file"] {
            display: none;
        }

        .file-label {
            display: block;
            padding: 40px 20px;
            border: 3px dashed #667eea;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }

        .file-label:hover {
            background: #f0f2ff;
            border-color: #764ba2;
        }

        .file-label.dragover {
            background: #e8ebff;
            border-color: #764ba2;
        }

        .file-label svg {
            width: 50px;
            height: 50px;
            margin-bottom: 10px;
            color: #667eea;
        }

        .file-label p {
            color: #333;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .file-label span {
            color: #999;
            font-size: 12px;
        }

        .image-preview {
            margin-top: 20px;
            display: none;
        }

        .image-preview img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .prediction-result {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }

        .result-item {
            margin-bottom: 15px;
        }

        .result-label {
            color: #666;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .result-value {
            color: #333;
            font-size: 18px;
            font-weight: 600;
        }

        .confidence-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 5px;
        }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s ease;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-predict {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-predict:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-predict:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-clear {
            background: #f0f0f0;
            color: #333;
        }

        .btn-clear:hover {
            background: #e0e0e0;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
            border-left: 4px solid #c33;
        }

        .success {
            background: #efe;
            color: #3c3;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
            border-left: 4px solid #3c3;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🥔 Potato Disease Predictor</h1>
            <p>Upload a leaf image to predict disease</p>
        </div>

        <div class="upload-section">
            <div class="file-input-wrapper">
                <input type="file" id="fileInput" accept="image/*">
                <label for="fileInput" class="file-label" id="fileLabel">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                    </svg>
                    <p>Click to upload or drag and drop</p>
                    <span>PNG, JPG, GIF up to 10MB</span>
                </label>
            </div>

            <div class="image-preview" id="imagePreview">
                <img id="previewImage" alt="Preview">
            </div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 10px; color: #666;">Analyzing image...</p>
        </div>

        <div class="error" id="error"></div>
        <div class="success" id="success"></div>

        <div class="prediction-result" id="predictionResult">
            <div class="result-item">
                <div class="result-label">Predicted Disease</div>
                <div class="result-value" id="predictedClass"></div>
            </div>
            <div class="result-item">
                <div class="result-label">Confidence Level</div>
                <div class="confidence-bar">
                    <div class="confidence-fill" id="confidenceFill"></div>
                </div>
                <div class="result-value" id="confidenceValue"></div>
            </div>
        </div>

        <div class="button-group">
            <button class="btn-predict" id="predictBtn" disabled>Predict</button>
            <button class="btn-clear" id="clearBtn">Clear</button>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8001';
        
        const fileInput = document.getElementById('fileInput');
        const fileLabel = document.getElementById('fileLabel');
        const imagePreview = document.getElementById('imagePreview');
        const previewImage = document.getElementById('previewImage');
        const predictBtn = document.getElementById('predictBtn');
        const clearBtn = document.getElementById('clearBtn');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const success = document.getElementById('success');
        const predictionResult = document.getElementById('predictionResult');
        const predictedClass = document.getElementById('predictedClass');
        const confidenceFill = document.getElementById('confidenceFill');
        const confidenceValue = document.getElementById('confidenceValue');

        let selectedFile = null;

        // File input change
        fileInput.addEventListener('change', handleFileSelect);

        // Drag and drop
        fileLabel.addEventListener('dragover', (e) => {
            e.preventDefault();
            fileLabel.classList.add('dragover');
        });

        fileLabel.addEventListener('dragleave', () => {
            fileLabel.classList.remove('dragover');
        });

        fileLabel.addEventListener('drop', (e) => {
            e.preventDefault();
            fileLabel.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                handleFileSelect();
            }
        });

        function handleFileSelect() {
            const file = fileInput.files[0];
            if (!file) return;

            // Validate file
            if (!file.type.startsWith('image/')) {
                showError('Please select a valid image file');
                return;
            }

            if (file.size > 10 * 1024 * 1024) {
                showError('File size must be less than 10MB');
                return;
            }

            selectedFile = file;
            
            // Show preview
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImage.src = e.target.result;
                imagePreview.style.display = 'block';
                predictBtn.disabled = false;
                hideError();
                predictionResult.style.display = 'none';
            };
            reader.readAsDataURL(file);
        }

        // Predict button
        predictBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            const formData = new FormData();
            formData.append('file', selectedFile);

            try {
                loading.style.display = 'block';
                predictionResult.style.display = 'none';
                hideError();

                const response = await fetch(`${API_URL}/predict`, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                
                // Display results
                predictedClass.textContent = data.predicted_class.replace(/_/g, ' ').toUpperCase();
                const confidence = data.confidence;
                confidenceFill.style.width = confidence + '%';
                confidenceValue.textContent = confidence + '%';
                
                predictionResult.style.display = 'block';
                showSuccess('Prediction complete!');

            } catch (err) {
                showError('Error: ' + err.message + '. Make sure backend is running on http://localhost:8001');
            } finally {
                loading.style.display = 'none';
            }
        });

        // Clear button
        clearBtn.addEventListener('click', () => {
            fileInput.value = '';
            selectedFile = null;
            imagePreview.style.display = 'none';
            predictionResult.style.display = 'none';
            predictBtn.disabled = true;
            hideError();
        });

        function showError(msg) {
            error.textContent = msg;
            error.style.display = 'block';
            success.style.display = 'none';
        }

        function showSuccess(msg) {
            success.textContent = msg;
            success.style.display = 'block';
            error.style.display = 'none';
        }

        function hideError() {
            error.style.display = 'none';
            success.style.display = 'none';
        }

        // Test API connection on load
        window.addEventListener('load', async () => {
            try {
                const response = await fetch(`${API_URL}/ping`);
                if (response.ok) {
                    console.log('✓ Backend connected');
                }
            } catch (err) {
                console.warn('⚠ Backend not accessible at ' + API_URL);
            }
        });
    </script>
</body>
</html>
